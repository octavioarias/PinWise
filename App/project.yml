# XcodeGen spec — generates the PinWise iOS app project with one command.
#   brew install xcodegen   # if needed
#   cd App && xcodegen generate && open PinWise.xcodeproj
# The app links the local PeptideKit package (this same directory) and compiles the
# SwiftUI sources under iOSApp/. Keeps the manual-setup steps in iOSApp/README.md optional.
name: PinWise
options:
  bundleIdPrefix: com.pinwise
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  PeptideKit:
    path: .
  MuscleMap:
    url: https://github.com/melihcolpan/MuscleMap.git
    from: "1.6.4"

targets:
  PinWise:
    type: application
    platform: iOS
    sources:
      - path: iOSApp
        excludes:
          - "**/*.md"
    # XcodeGen GENERATES a complete Info.plist here (CFBundleIdentifier, CFBundleExecutable,
    # versions, package type, ...) and merges in these custom keys. Do not hand-edit the file.
    info:
      path: iOSApp/Info.plist
      properties:
        CFBundleDisplayName: PinWise
        # Launch is a storyboard (icon tile centered, wordmark at the bottom, brand-black bg).
        # Launch config must live HERE — xcodegen regenerates Info.plist from this block.
        UILaunchStoryboardName: LaunchScreenV3
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "PinWise displays the weight, resting heart rate, HRV, sleep, and step values you choose to share from Health alongside your dose logs."
        NSCameraUsageDescription: "PinWise uses the camera so you can photograph a vial label. The photo is read on your device to fill in the details."
    # HealthKit read access (weight, resting HR, HRV). XcodeGen generates the entitlements
    # file; the usage string lives in info.NSHealthShareUsageDescription above.
    entitlements:
      path: iOSApp/PinWise.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        # Sign in with Apple (native, no backend). Google/Email sign-in route through
        # AuthManager and require a backend + Google client ID to complete.
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: PeptideKit
        product: PeptideKit
      - package: MuscleMap
        product: MuscleMap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pinwise.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        # App icon: single 1024 asset per appearance (Light / Dark / Tinted) in
        # iOSApp/Assets.xcassets/AppIcon.appiconset — iOS picks the slot to match the
        # user's home-screen style. Source SVGs live in App/design/AppIcon.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App target uses Swift 5 language mode to avoid strict-concurrency friction during
        # early iteration; PeptideKit stays on Swift 6. Bump to "6.0" once the UI settles.
        SWIFT_VERSION: "5.0"

# Explicit shared scheme so CI (`xcodebuild -scheme PinWise`) works headlessly.
schemes:
  PinWise:
    build:
      targets:
        PinWise: all
    run:
      config: Debug
