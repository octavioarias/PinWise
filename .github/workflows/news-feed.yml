name: News feed

# Regenerates feed/feed.json daily from ClinicalTrials.gov + PubMed (cheap Linux runner).
# Publish this file to a public host (Pages/CDN) and point AppConfig.newsFeedURL at it to
# switch the app from the bundled sample to the live feed.
on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build feed
        run: node scripts/build-feed.mjs
      - name: Commit if changed
        run: |
          git config user.name "pinwise-bot"
          git config user.email "pinwise-bot@users.noreply.github.com"
          git add feed/feed.json
          git diff --staged --quiet || git commit -m "chore: update news feed [skip ci]"
          git push
