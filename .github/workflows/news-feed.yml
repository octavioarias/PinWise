name: News feed

# Regenerates the News feed daily and publishes it to the PUBLIC PinWise-NewsFeed repo, which
# the app fetches (AppConfig.newsFeedURL). This private repo only READS its own source; the
# publish step writes to the separate public repo using the FEED_REPO_TOKEN secret — so no
# push to this repo's protected branches, and none of this repo's code is exposed.
#
# Published URL: https://raw.githubusercontent.com/TavioTheScientist/PinWise-NewsFeed/main/feed.json
on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build feed
        env:
          # Optional: enables the LLM rewrite of fresh items into punchy, plain-language copy.
          # If unset, build-feed.mjs falls back to raw extracted text (build still succeeds).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-feed.mjs
      - name: Validate feed (gate — never publish a broken feed)
        run: node scripts/news-content/validate-feed.mjs feed/feed.json
      - name: Publish to PinWise-NewsFeed
        env:
          FEED_REPO_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FEED_REPO_TOKEN}" ]; then
            echo "FEED_REPO_TOKEN is not set — add it as an Actions secret."; exit 1
          fi
          git clone --depth 1 \
            "https://x-access-token:${FEED_REPO_TOKEN}@github.com/TavioTheScientist/PinWise-NewsFeed.git" out
          cp feed/feed.json out/feed.json
          cd out
          git config user.name "pinwise-bot"
          git config user.email "pinwise-bot@users.noreply.github.com"
          git add feed.json
          if git diff --staged --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: update news feed"
            git push
          fi
